name: Despliegue del código

on:
  push:
    branches: [main]
    paths:
      - "techuniverse-api/**"
      - "Angular-frontend/**"
      - "React-components/**"
  workflow_dispatch:

env:
  AWS_DEFAULT_REGION: us-east-1

jobs:

  # ─────────────────────────────────────────────
  # 🔍 DETECTAR QUÉ HA CAMBIADO
  # ─────────────────────────────────────────────
  changes:
    name: 🔍 Detectar cambios
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend  == 'true' || github.event_name == 'workflow_dispatch' }}
      frontend: ${{ steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'techuniverse-api/**'
            frontend:
              - 'Angular-frontend/**'
              - 'React-components/**'


  # ─────────────────────────────────────────────
  # 🧪 TESTS BACKEND — Laravel
  # ─────────────────────────────────────────────
  tests-backend:
    name: 🧪 Tests Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: techuniverse_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo, pdo_mysql
          tools: composer

      - name: Instalar dependencias
        working-directory: techuniverse-api
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: 🔍 Laravel Pint
        working-directory: techuniverse-api
        run: ./vendor/bin/pint --test

      - name: Configurar .env.testing
        working-directory: techuniverse-api
        run: |
          echo "APP_ENV=testing"            >> .env.testing
          echo "APP_KEY="                   >> .env.testing
          echo "DB_CONNECTION=mysql"        >> .env.testing
          echo "DB_HOST=127.0.0.1"          >> .env.testing
          echo "DB_PORT=3306"               >> .env.testing
          echo "DB_DATABASE=techuniverse_test" >> .env.testing
          echo "DB_USERNAME=root"           >> .env.testing
          echo "DB_PASSWORD=root"           >> .env.testing
          echo "FILESYSTEM_DISK=local"      >> .env.testing

      - name: Generar APP_KEY
        working-directory: techuniverse-api
        run: php artisan key:generate --env=testing

      - name: Migrar base de datos
        working-directory: techuniverse-api
        run: php artisan migrate --env=testing --force

      - name: 🧪 Ejecutar tests
        working-directory: techuniverse-api
        run: php artisan test --env=testing


  # ─────────────────────────────────────────────
  # 🎨 TESTS FRONTEND — Angular
  # ─────────────────────────────────────────────
  tests-frontend:
    name: 🎨 Tests Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Angular-frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: Angular-frontend
        run: npm ci

      - name: 🎨 Ejecutar tests Angular
        working-directory: Angular-frontend
        run: npm test


  # ─────────────────────────────────────────────
  # 🚀 DEPLOY BACKEND
  # ─────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    needs: [changes, tests-backend]
    if: needs.changes.outputs.backend == 'true' && needs.tests-backend.result == 'success'

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # =========================
      # VERIFICAR INSTANCIA
      # =========================
      - name: Verificar instancia BackEnd
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=BackEnd" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "❌ No se encontró la instancia BackEnd en estado running"
            exit 1
          fi

          echo "✅ BackEnd instance: $INSTANCE_ID"
          aws ec2 wait instance-status-ok --instance-ids $INSTANCE_ID
          echo "✅ Instancia lista"

      # =========================
      # BUILD
      # =========================
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Instalar dependencias
        working-directory: techuniverse-api
        run: composer install --no-dev --optimize-autoloader

      # =========================
      # EMPAQUETAR Y SUBIR
      # =========================
      - name: Crear ZIP backend
        run: |
          cd techuniverse-api
          zip -r ../backend.zip . \
            -x "*.git*" \
            -x "node_modules/*" \
            -x ".env"

      - name: Subir artefacto a S3
        run: |
          aws s3 cp backend.zip s3://techuniverse-terraform-state/deployments/backend.zip

      - name: 🚀 Crear despliegue CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name techuniverse-backend \
            --deployment-group-name techuniverse-backend-group \
            --s3-location bucket=techuniverse-terraform-state,key=deployments/backend.zip,bundleType=zip \
            --description "Backend deploy ${{ github.sha }}"


  # ─────────────────────────────────────────────
  # 🌐 DEPLOY FRONTEND
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend
    runs-on: ubuntu-latest
    needs: [changes, tests-frontend]
    if: needs.changes.outputs.frontend == 'true' && needs.tests-frontend.result == 'success'

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # =========================
      # BUILD
      # =========================
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Angular-frontend/package-lock.json

      - name: Instalar dependencias Angular
        working-directory: Angular-frontend
        run: npm ci

      - name: Build Angular
        working-directory: Angular-frontend
        run: npm run build

      # =========================
      # EMPAQUETAR Y SUBIR
      # =========================
      - name: Crear ZIP frontend
        run: |
          mkdir -p deploy
          cp -r Angular-frontend/dist/*/browser deploy/browser
          cp Angular-frontend/appspec.yml deploy/ || true
          cp -r Angular-frontend/scripts deploy/  || true
          cd deploy && zip -r ../frontend.zip .

      - name: Subir artefacto a S3
        run: |
          aws s3 cp frontend.zip s3://techuniverse-terraform-state/deployments/frontend.zip

      - name: 🌐 Crear despliegue CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name techuniverse-frontend \
            --deployment-group-name techuniverse-frontend-group \
            --s3-location bucket=techuniverse-terraform-state,key=deployments/frontend.zip,bundleType=zip \
            --description "Frontend deploy ${{ github.sha }}"
