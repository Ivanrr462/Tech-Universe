services:

  web:
    build: .
    container_name: web_techuniverse
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - ./techuniverse:/var/www/html

  db:
    image: mysql:5.7
    container_name: db__techuniverse
    environment:
      MYSQL_ROOT_PASSWORD: usuario1
      MYSQL_DATABASE: prueba
      MYSQL_USER: usuario
      MYSQL_PASSWORD: usuario
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5
    container_name: pma_techuniverse
    environment:
      - PMA_HOST=db
    depends_on:
      - db
    ports:
      - "8081:80"
volumes:
  db_data: