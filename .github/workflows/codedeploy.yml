name: CodeDeploy Backend

on:
  push:
    # Borrar rama develop cuando este probado y funcionando
    branches: [main, develop]
    paths:
      - "techuniverse-api/**"
      - "Angular-frontend/**"
      - "React-components/**"
      # Esta linea es solo para pruebas
      - "despliegue-aws/**"
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # 🔍 LINT + 🧪 TESTS — Laravel
  # ─────────────────────────────────────────────
  lint-and-tests:
    name: 🔍 Lint & 🧪 Tests Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: techuniverse-api

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: techuniverse_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_mysql
          tools: composer

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: 🔍 Run Laravel Pint
        run: ./vendor/bin/pint --test

      - name: Configure .env.testing
        run: |
          echo "APP_ENV=testing" >> .env.testing
          echo "APP_KEY=" >> .env.testing
          echo "DB_CONNECTION=mysql" >> .env.testing
          echo "DB_HOST=127.0.0.1" >> .env.testing
          echo "DB_PORT=3306" >> .env.testing
          echo "DB_DATABASE=techuniverse_test" >> .env.testing
          echo "DB_USERNAME=root" >> .env.testing
          echo "DB_PASSWORD=root" >> .env.testing

      - name: Generate app key
        run: php artisan key:generate --env=testing

      - name: Run migrations
        run: php artisan migrate --env=testing --force

      - name: 🧪 Run tests
        run: php artisan test --env=testing

  # ─────────────────────────────────────────────
  # 🚀 DEPLOY BACKEND — CodeDeploy
  # ─────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    needs: lint-and-tests

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Comprimir código
        run: |
          cd techuniverse-api
          zip -r ../backend.zip . -x "*.git*" -x "node_modules/*" -x "vendor/*"

      - name: ☁️ Subir a S3
        run: |
          aws s3 cp backend.zip s3://techuniverse-terraform-state/deployments/backend.zip

      - name: 🚀 Crear deployment en CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name techuniverse-backend \
            --deployment-group-name techuniverse-backend-group \
            --s3-location bucket=techuniverse-terraform-state,key=deployments/backend.zip,bundleType=zip \
            --description "Deploy desde GitHub Actions - ${{ github.sha }}"

  # ─────────────────────────────────────────────
  # 🎨 TESTS — Angular
  # ─────────────────────────────────────────────
  test-angular:
    name: 🎨 Tests Angular
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Angular-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Angular-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ─────────────────────────────────────────────
  # 🎨 DEPLOY — Angular Frontend (CodeDeploy)
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: 🎨 Deploy Frontend (Angular)
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Angular-frontend/package-lock.json

      - name: 📦 Instalar dependencias
        working-directory: Angular-frontend
        run: npm ci

      - name: 🏗️ Build Angular
        working-directory: Angular-frontend
        run: npm run build

      - name: 🗜️ Empaquetar para CodeDeploy
        run: |
          mkdir -p deploy
          cp -r Angular-frontend/dist/tech-cart-quest-angular/browser deploy/browser
          cp Angular-frontend/appspec.yml deploy/
          cp -r Angular-frontend/scripts deploy/
          cd deploy && zip -r ../frontend.zip .

      - name: ☁️ Subir a S3
        run: aws s3 cp frontend.zip s3://techuniverse-terraform-state/deployments/frontend.zip

      - name: 🚀 Crear deployment en CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name techuniverse-frontend \
            --deployment-group-name techuniverse-frontend-group \
            --s3-location bucket=techuniverse-terraform-state,key=deployments/frontend.zip,bundleType=zip \
            --description "Deploy Frontend - ${{ github.sha }}"
