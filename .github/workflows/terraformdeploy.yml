name: Terraform AWS Deploy

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'despliegue-aws/**'
      - 'Angular-frontend/**'
  workflow_dispatch:

jobs:
  terraform:
    name: 🏗️ Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: despliegue-aws

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1
      TF_VAR_db_root_password: ${{ secrets.DB_ROOT_PASSWORD }}
      TF_VAR_key_name: ${{ secrets.AWS_KEY_NAME }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: 🔍 Terraform Init
        run: terraform init

      - name: ✅ Terraform Validate
        run: terraform validate

      - name: 📋 Terraform Plan
        run: terraform plan -out=tfplan

      - name: 🚀 Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ─────────────────────────────────────────────
  # 🎨 DEPLOY — Angular Frontend (CodeDeploy)
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: 🎨 Deploy Frontend (Angular)
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Angular-frontend/package-lock.json

      - name: 📦 Instalar dependencias
        working-directory: Angular-frontend
        run: npm ci

      - name: 🏗️ Build Angular
        working-directory: Angular-frontend
        run: npm run build

      - name: 🗜️ Empaquetar para CodeDeploy
        run: |
          mkdir -p deploy
          cp -r Angular-frontend/dist/tech-cart-quest-angular/browser deploy/browser
          cp Angular-frontend/appspec.yml deploy/
          cp -r Angular-frontend/scripts deploy/
          cd deploy && zip -r ../frontend.zip .

      - name: ☁️ Subir a S3
        run: aws s3 cp frontend.zip s3://techuniverse-terraform-state/deployments/frontend.zip

      - name: 🚀 Crear deployment en CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name techuniverse-frontend \
            --deployment-group-name techuniverse-frontend-group \
            --s3-location bucket=techuniverse-terraform-state,key=deployments/frontend.zip,bundleType=zip \
            --description "Deploy Frontend - ${{ github.sha }}"