name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - "techuniverse-api/**"
      - "Angular-frontend/**"
      - "React-components/**"
  workflow_dispatch:

jobs:
 # ─────────────────────────────────────────────
  # 🔍 LINT + 🧪 TESTS — Laravel
  # ─────────────────────────────────────────────
  tests:
    name: 🔍 Tests Backend + 🎨 Tests Frontend
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: techuniverse_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 🔍 BACKEND — Laravel Tests
      # ─────────────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_mysql
          tools: composer

      - name: Install backend dependencies
        working-directory: techuniverse-api
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: 🔍 Run Laravel Pint
        working-directory: techuniverse-api
        run: ./vendor/bin/pint --test

      - name: Configure .env.testing
        working-directory: techuniverse-api
        run: |
          echo "APP_ENV=testing" >> .env.testing
          echo "APP_KEY=" >> .env.testing
          echo "DB_CONNECTION=mysql" >> .env.testing
          echo "DB_HOST=127.0.0.1" >> .env.testing
          echo "DB_PORT=3306" >> .env.testing
          echo "DB_DATABASE=techuniverse_test" >> .env.testing
          echo "DB_USERNAME=root" >> .env.testing
          echo "DB_PASSWORD=root" >> .env.testing

      - name: Generate app key
        working-directory: techuniverse-api
        run: php artisan key:generate --env=testing

      - name: Run migrations
        working-directory: techuniverse-api
        run: php artisan migrate --env=testing --force

      - name: 🧪 Run backend tests
        working-directory: techuniverse-api
        run: php artisan test --env=testing

      # ─────────────────────────────────────────────
      # 🎨 FRONTEND — Angular Tests
      # ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Angular-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Angular-frontend
        run: npm ci

      - name: Run Angular unit tests
        working-directory: Angular-frontend
        run: npm test