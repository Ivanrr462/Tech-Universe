name: Despliegue del código

on:
  push:
    branches: [ main, develop ]
    paths:
      - "techuniverse-api/**"
      - "Angular-frontend/**"
      - "React-components/**"
      - 'despliegue-aws/**'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # 🔍 LINT + 🧪 TESTS — Laravel
  # ─────────────────────────────────────────────
  tests:
    name: 🔍 Tests Backend + 🎨 Tests Frontend
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: techuniverse_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 🔍 BACKEND — Laravel Tests
      # ─────────────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_mysql
          tools: composer

      - name: Install backend dependencies
        working-directory: techuniverse-api
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: 🔍 Run Laravel Pint
        working-directory: techuniverse-api
        run: ./vendor/bin/pint --test

      - name: Configure .env.testing
        working-directory: techuniverse-api
        run: |
          echo "APP_ENV=testing" >> .env.testing
          echo "APP_KEY=" >> .env.testing
          echo "DB_CONNECTION=mysql" >> .env.testing
          echo "DB_HOST=127.0.0.1" >> .env.testing
          echo "DB_PORT=3306" >> .env.testing
          echo "DB_DATABASE=techuniverse_test" >> .env.testing
          echo "DB_USERNAME=root" >> .env.testing
          echo "DB_PASSWORD=root" >> .env.testing

      - name: Generate app key
        working-directory: techuniverse-api
        run: php artisan key:generate --env=testing

      - name: Run migrations
        working-directory: techuniverse-api
        run: php artisan migrate --env=testing --force

      - name: 🧪 Run backend tests
        working-directory: techuniverse-api
        run: php artisan test --env=testing

      # ─────────────────────────────────────────────
      # 🎨 FRONTEND — Angular Tests
      # ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Angular-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Angular-frontend
        run: npm ci

      - name: Run Angular unit tests
        working-directory: Angular-frontend
        run: npm test

  # ─────────────────────────────────────────────
  # 🚀 TERRAFORM
  # ─────────────────────────────────────────────
  terraform:
    name: 🏗️ Terraform Apply
    runs-on: ubuntu-latest
    needs: tests
    defaults:
      run:
        working-directory: despliegue-aws

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1
      TF_VAR_db_root_password: ${{ secrets.DB_ROOT_PASSWORD }}
      TF_VAR_key_name: ${{ secrets.AWS_KEY_NAME }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: 🔍 Terraform Init
        run: terraform init

      - name: ✅ Terraform Validate
        run: terraform validate

      - name: 📋 Terraform Plan
        run: terraform plan -out=tfplan

      - name: 🚀 Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ─────────────────────────────────────────────
  # 🚀 DEPLOY BACKEND — CodeDeploy
  # ─────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    needs: terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Comprimir código
        run: |
          cd techuniverse-api
          zip -r ../backend.zip . -x "*.git*" -x "node_modules/*" -x "vendor/*"

      - name: ☁️ Subir a S3
        run: |
          aws s3 cp backend.zip s3://techuniverse-terraform-state/deployments/backend.zip

      - name: 🚀 Crear deployment en CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name techuniverse-backend \
            --deployment-group-name techuniverse-backend-group \
            --s3-location bucket=techuniverse-terraform-state,key=deployments/backend.zip,bundleType=zip \
            --description "Deploy desde GitHub Actions - ${{ github.sha }}"

  # ─────────────────────────────────────────────
  # 🎨 DEPLOY — Angular Frontend (CodeDeploy)
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: 🎨 Deploy Frontend (Angular)
    runs-on: ubuntu-latest
    needs: terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Angular-frontend/package-lock.json

      - name: 📦 Instalar dependencias
        working-directory: Angular-frontend
        run: npm ci

      - name: 🏗️ Build Angular
        working-directory: Angular-frontend
        run: npm run build

      - name: 🗜️ Empaquetar para CodeDeploy
        run: |
          mkdir -p deploy
          cp -r Angular-frontend/dist/tech-cart-quest-angular/browser deploy/browser
          cp Angular-frontend/appspec.yml deploy/
          cp -r Angular-frontend/scripts deploy/
          cd deploy && zip -r ../frontend.zip .

      - name: ☁️ Subir a S3
        run: aws s3 cp frontend.zip s3://techuniverse-terraform-state/deployments/frontend.zip

      - name: 🚀 Crear deployment en CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name techuniverse-frontend \
            --deployment-group-name techuniverse-frontend-group \
            --s3-location bucket=techuniverse-terraform-state,key=deployments/frontend.zip,bundleType=zip \
            --description "Deploy Frontend - ${{ github.sha }}"
