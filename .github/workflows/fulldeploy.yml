name: Despliegue de todo el conjunto

on:
  workflow_dispatch:

env:
  AWS_DEFAULT_REGION: us-east-1

jobs:
  # ─────────────────────────────────────────────
  # 🏗️ TERRAFORM
  # ─────────────────────────────────────────────
  terraform:
    name: 🏗️ Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: despliegue-aws

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      TF_VAR_db_root_password: ${{ secrets.DB_ROOT_PASSWORD }}
      TF_VAR_key_name: ${{ secrets.AWS_KEY_NAME }}
      TF_VAR_duckdns_token: ${{ secrets.TOKEN_DUCKDNS }}
      TF_VAR_r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID }}
      TF_VAR_r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - run: terraform init
      - run: terraform validate
      - run: terraform plan -replace=aws_instance.BackEnd -replace=aws_instance.FrontEnd -out=tfplan
      - run: terraform apply -auto-approve tfplan

  # ─────────────────────────────────────────────
  # 🚀 DEPLOY BACKEND
  # ─────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    needs: terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # =========================
      # VERIFICAR Y ESPERAR INSTANCIA BACKEND
      # =========================
      - name: Verificar y esperar instancia BackEnd
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=BackEnd" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "❌ No se encontró la instancia BackEnd en estado running"
            exit 1
          fi

          echo "✅ BackEnd instance ID: $INSTANCE_ID"
          aws ec2 wait instance-status-ok --instance-ids $INSTANCE_ID
          echo "✅ Instancia lista"

      # =========================
      # BUILD
      # =========================
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Instalar dependencias
        working-directory: techuniverse-api
        run: composer install --no-dev --optimize-autoloader

      # =========================
      # EMPAQUETAR Y SUBIR
      # =========================
      - name: Crear ZIP backend
        run: |
          cd techuniverse-api
          zip -r ../backend.zip . \
            -x "*.git*" \
            -x "node_modules/*" \
            -x ".env"

      - name: Subir artefacto a S3
        run: |
          aws s3 cp backend.zip s3://techuniverse-terraform-state/deployments/backend.zip

      - name: 🚀 Crear despliegue CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name techuniverse-backend \
            --deployment-group-name techuniverse-backend-group \
            --s3-location bucket=techuniverse-terraform-state,key=deployments/backend.zip,bundleType=zip \
            --description "Backend deploy ${{ github.sha }}"

  # ─────────────────────────────────────────────
  # 🌐 DEPLOY FRONTEND
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend
    runs-on: ubuntu-latest
    needs: terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # =========================
      # BUILD
      # =========================
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Angular-frontend/package-lock.json

      - name: Instalar dependencias Angular
        working-directory: Angular-frontend
        run: npm ci

      - name: Build Angular
        working-directory: Angular-frontend
        run: npm run build

      # =========================
      # EMPAQUETAR Y SUBIR
      # =========================
      - name: Crear ZIP frontend
        run: |
          mkdir -p deploy
          cp -r Angular-frontend/dist/*/browser deploy/browser
          cp Angular-frontend/appspec.yml deploy/ || true
          cp -r Angular-frontend/scripts deploy/  || true
          cd deploy && zip -r ../frontend.zip .

      - name: Subir artefacto a S3
        run: |
          aws s3 cp frontend.zip s3://techuniverse-terraform-state/deployments/frontend.zip

      - name: 🌐 Crear despliegue CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name techuniverse-frontend \
            --deployment-group-name techuniverse-frontend-group \
            --s3-location bucket=techuniverse-terraform-state,key=deployments/frontend.zip,bundleType=zip \
            --description "Frontend deploy ${{ github.sha }}"
