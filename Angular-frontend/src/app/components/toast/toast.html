<div class="fixed bottom-4 right-4 z-50 flex flex-col gap-3 pointer-events-none w-full max-w-sm px-4 sm:px-0">
  @for (toast of toastService.toasts(); track toast.id) {
    <div @toastAnimations
      class="pointer-events-auto w-full bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-xl shadow-lg shadow-black/5 dark:shadow-black/20 overflow-hidden flex items-start p-4 transition-all"
    >
      <!-- Icon -->
      <div [class]="'flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center ' + getBgColorClass(toast.type)">
        <lucide-icon [img]="getIcon(toast.type)" [class]="'w-5 h-5 ' + getIconColorClass(toast.type)"></lucide-icon>
      </div>

      <!-- Content -->
      <div class="ml-4 flex-1">
        <h3 class="text-sm font-semibold text-gray-900 dark:text-white">
          {{ toast.title || (toast.type === 'success' ? 'Éxito' : toast.type === 'error' ? 'Error' : toast.type === 'warning' ? 'Aviso' : 'Información') }}
        </h3>
        <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
          {{ toast.message }}
        </p>
      </div>

      <!-- Close button -->
      <button 
        (click)="toastService.remove(toast.id)"
        class="ml-4 flex-shrink-0 text-gray-400 hover:text-gray-500 dark:hover:text-gray-300 focus:outline-none transition-colors"
      >
        <lucide-icon [img]="CloseIcon" class="w-5 h-5"></lucide-icon>
      </button>
      
      <!-- Progress Bar (Fake animation using tailwind) -->
      <div [class]="'absolute bottom-0 left-0 h-1 animate-[shrink_3s_linear_forwards] ' + getIconColorClass(toast.type).split(' ')[0].replace('text-', 'bg-')"></div>
    </div>
  }
</div>
