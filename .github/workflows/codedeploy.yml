name: Despliegue del código

on:
  push:
    branches: [ main, develop ]
    paths:
      - "techuniverse-api/**"
      - "Angular-frontend/**"
      - "React-components/**"
      - "despliegue-aws/**"
  workflow_dispatch:

env:
  AWS_DEFAULT_REGION: us-east-1

jobs:

# ─────────────────────────────────────────────
# 🏗️ TERRAFORM
# ─────────────────────────────────────────────
  terraform:
    name: 🏗️ Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: despliegue-aws

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      TF_VAR_db_root_password: ${{ secrets.DB_ROOT_PASSWORD }}
      TF_VAR_key_name: ${{ secrets.AWS_KEY_NAME }}
      TF_VAR_duckdns_token: ${{ secrets.TOKEN_DUCKDNS }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - run: terraform init
      - run: terraform validate
      - run: terraform plan -out=tfplan
      - run: terraform apply -auto-approve tfplan


# ─────────────────────────────────────────────
# 🚀 BACKEND (Laravel)
# ─────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    needs: terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # =========================
      # COMPOSER BUILD (AQUÍ)
      # =========================
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Install dependencies
        working-directory: techuniverse-api
        run: composer install --no-dev --optimize-autoloader

      # =========================
      # EMPAQUETADO
      # =========================
      - name: Crear ZIP backend
        run: |
          cd techuniverse-api
          zip -r ../backend.zip . \
            -x "*.git*" \
            -x "node_modules/*" \
            -x ".env"

      - name: Subir a S3
        run: |
          aws s3 cp backend.zip s3://techuniverse-terraform-state/deployments/backend.zip

      - name: Deploy CodeDeploy backend
        run: |
          aws deploy create-deployment \
            --application-name techuniverse-backend \
            --deployment-group-name techuniverse-backend-group \
            --s3-location bucket=techuniverse-terraform-state,key=deployments/backend.zip,bundleType=zip \
            --description "Backend deploy ${{ github.sha }}"


# ─────────────────────────────────────────────
# 🎨 FRONTEND ANGULAR (BUILD AQUÍ)
# ─────────────────────────────────────────────
  deploy-frontend:
    name: 🎨 Deploy Frontend
    runs-on: ubuntu-latest
    needs: terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # =========================
      # NODE BUILD
      # =========================
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Angular-frontend/package-lock.json

      - name: Install Angular deps
        working-directory: Angular-frontend
        run: npm ci

      - name: Build Angular
        working-directory: Angular-frontend
        run: npm run build

      # =========================
      # EMPAQUETADO
      # =========================
      - name: Crear ZIP frontend
        run: |
          mkdir -p deploy
          cp -r Angular-frontend/dist/*/browser deploy/browser
          cp Angular-frontend/appspec.yml deploy/ || true
          cp -r Angular-frontend/scripts deploy/ || true

          cd deploy
          zip -r ../frontend.zip .

      - name: Subir a S3
        run: |
          aws s3 cp frontend.zip s3://techuniverse-terraform-state/deployments/frontend.zip

      - name: Deploy CodeDeploy frontend
        run: |
          aws deploy create-deployment \
            --application-name techuniverse-frontend \
            --deployment-group-name techuniverse-frontend-group \
            --s3-location bucket=techuniverse-terraform-state,key=deployments/frontend.zip,bundleType=zip \
            --description "Frontend deploy ${{ github.sha }}"