name: Terraform AWS Deploy

on:
  workflow_dispatch:

jobs:
  
# ─────────────────────────────────────────────
# 🏗️ TERRAFORM
# ─────────────────────────────────────────────
  terraform:
    name: 🏗️ Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: despliegue-aws

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      TF_VAR_db_root_password: ${{ secrets.DB_ROOT_PASSWORD }}
      TF_VAR_key_name: ${{ secrets.AWS_KEY_NAME }}
      TF_VAR_duckdns_token: ${{ secrets.TOKEN_DUCKDNS }}
      TF_VAR_r2_access_key_id: ${{ secrets.R2_ACCESS_KEY_ID }}
      TF_VAR_r2_secret_access_key: ${{ secrets.R2_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - run: terraform init
      - run: terraform validate
      - run: terraform plan -replace=aws_instance.BackEnd -replace=aws_instance.FrontEnd -out=tfplan
      - run: terraform apply -auto-approve tfplan
